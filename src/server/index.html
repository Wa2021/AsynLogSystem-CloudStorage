<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>异步日志存储系统</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --background: #f5f6fa;
            --card-bg: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--background);
            padding: 2rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 2rem;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            position: relative;
        }

        .logout-btn {
            position: absolute;
            top: 2rem;
            right: 2rem;
            padding: 0.5rem 1rem;
            background: #e74c3c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .upload-section {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
            font-weight: 500;
        }

        input[type="file"] {
            border: 2px dashed #ddd;
            padding: 1rem;
            width: 100%;
            border-radius: 5px;
            cursor: pointer;
        }

        .storage-type {
            display: flex;
            gap: 1rem;
            margin: 1rem 0;
        }

        .storage-type label {
            background: #f0f0f0;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .storage-type input:checked+label {
            background: var(--secondary-color);
            color: white;
        }

        button {
            background: var(--secondary-color);
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .file-list {
            background: var(--card-bg);
            border-radius: 10px;
            padding: 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .file-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            border-bottom: 1px solid #eee;
        }

        .file-info {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .file-type {
            background: #eee;
            padding: 0.3rem 0.8rem;
            border-radius: 5px;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📁异步日志存储系统</h1>

        <div class="upload-section">
            <div class="form-group">
                <label>选择文件</label>
                <input type="file" id="fileInput">
            </div>

            <div class="form-group">
                <label>存储类型</label>
                <div class="storage-type">
                    <div>
                        <input type="radio" name="storageType" id="deepStorage" value="deep" checked>
                        <label for="deepStorage">深度存储</label>
                    </div>
                    <div>
                        <input type="radio" name="storageType" id="lowStorage" value="low">
                        <label for="lowStorage">普通存储</label>
                    </div>
                </div>
            </div>

            <button onclick="uploadFile()">
                ⬆️ 开始上传
            </button>
        </div>

        <div class="search-section"
            style="margin-bottom: 2rem; background: var(--card-bg); padding: 1.5rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <div class="form-group"
                style="margin-bottom: 0; display: flex; gap: 10px; position: relative;">
                <input type="text" id="searchInput" placeholder="搜索文件名..." oninput="searchFiles()"
                    style="flex: 1; padding: 0.8rem; padding-right: 3rem; border: 1px solid #ddd; border-radius: 5px;">
                <button onclick="clearSearch()" id="clearBtn" 
                    style="position: absolute; right: 80px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #999; cursor: pointer; display: none; padding: 0.5rem; font-size: 1.2rem;">
                    ✕
                </button>
                <button onclick="searchFiles()" style="margin: 0;">🔍 搜索</button>
            </div>
        </div>

        <!-- 文件列表动态插入点 -->
        {{FILE_LIST}}
    </div>

    <script>
        // 动态配置注入
        const config = {
            backendUrl: '{{BACKEND_URL}}'
        };

        // 页面初始化：检查登录状态
        window.addEventListener('load', function() { // 使用 addEventListener
          // 如果没有 sessionStorage 标记（说明是新标签页/重新打开），但可能浏览器还存着 Cookie
          // 此时我们强制跳转到登录页，要求用户再次输入密码
          if (!sessionStorage.getItem('is_logged_in')) {
              window.location.href = '/login';
          }
        });

        async function uploadFile() {
            const fileInput = document.getElementById('fileInput');
            const storageType = document.querySelector('input[name="storageType"]:checked').value;
            const file = fileInput.files[0];

            if (!file) {
                alert('请先选择文件');
                return;
            }

            // check duplicate file
            const fileList = document.querySelector('.file-list');
            if (fileList) {
                const items = fileList.getElementsByClassName('file-item');
                for (let i = 0; i < items.length; i++) {
                    const item = items[i];
                    const nameSpan = item.getElementsByTagName('span')[0];
                    if (nameSpan) {
                         const txtValue = nameSpan.textContent || nameSpan.innerText;
                         const cleanTxt = txtValue.replace('📄', '').trim();
                         if (cleanTxt === file.name.trim()) {
                             if (!confirm('文件 "' + cleanTxt + '" 已存在。是否覆盖？')) {
                                 return;
                             }
                             break;
                         }
                    }
                }
            }

            // // Base64 编码
            const encodedFilename = btoa(unescape(encodeURIComponent(file.name)));
            console.log("Base64 编码结果:", encodedFilename);

            try {
                const response = await fetch(`${config.backendUrl}/upload`, {
                    method: 'POST',
                    headers: {
                        'StorageType': storageType,
                        'FileName': encodedFilename // 使用 Base64 编码
                    },
                    body: file
                });

                if (response.ok) {
                    location.reload();
                } else {
                    alert(`上传失败: ${response.status}`);
                }
            } catch (error) {
                console.error('上传错误:', error);
                alert('网络连接失败');
            }
        }

        async function deleteFile(url) {
            if (!confirm('确定要删除这个文件吗？')) {
                return;
            }
            try {
                // HTTP header 中不能包含中文，所以需要 encode
                const encodedUrl = encodeURIComponent(url);
                const response = await fetch(`${config.backendUrl}/delete`, {
                    method: 'POST',
                    headers: {
                        'DeleteUrl': encodedUrl
                    }
                });

                if (response.ok) {
                    alert('删除成功');
                    location.reload();
                } else {
                    alert(`删除失败: ${response.status}`);
                }
            } catch (error) {
                console.error('删除错误:', error);
                alert('网络错误');
            }
        }

        function clearSearch() {
            const input = document.getElementById('searchInput');
            input.value = '';
            searchFiles(); // 重新触发搜索 logic，内容为空时会显示所有
            input.focus();
        }

        function searchFiles() {
            const input = document.getElementById('searchInput');
            const clearBtn = document.getElementById('clearBtn');
            const filter = input.value.toUpperCase();
            
            // 控制清除按钮显示
            if (input.value.length > 0) {
                clearBtn.style.display = 'block';
            } else {
                clearBtn.style.display = 'none';
            }

            const fileList = document.querySelector('.file-list');
            if (!fileList) return;
            const items = fileList.getElementsByClassName('file-item');

            for (let i = 0; i < items.length; i++) {
                const item = items[i];
                const nameSpan = item.getElementsByTagName('span')[0];
                if (nameSpan) {
                    const txtValue = nameSpan.textContent || nameSpan.innerText;
                    const cleanTxt = txtValue.replace('📄', '');
                    if (cleanTxt.toUpperCase().indexOf(filter) > -1) {
                        item.style.display = "";
                    } else {
                        item.style.display = "none";
                    }
                }
            }
        }
    </script>
</body>
</html>
