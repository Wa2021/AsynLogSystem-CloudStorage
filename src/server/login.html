<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 异步日志存储系统</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --background: #f5f6fa;
            --card-bg: #ffffff;
        }
        body {
            background-color: var(--background);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .login-card {
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }
        h1 {
            color: var(--primary-color);
            text-align: center;
            margin-bottom: 2rem;
            font-size: 1.8rem;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--primary-color);
        }
        input {
            width: 100%;
            padding: 0.8rem;
            border: 1px solid #ddd;
            border-radius: 5px;
            box-sizing: border-box;
            font-size: 1rem;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            background: var(--secondary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 1rem;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        button:hover {
            opacity: 0.9;
        }
        .footer {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.8rem;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🔐 系统登录</h1>
        <div class="form-group">
            <label>密码</label>
            <input type="password" id="password" placeholder="请输入访问密码" onkeypress="handleKeyPress(event)">
        </div>
        <button onclick="login()">登 录</button>
        <div class="footer">异步日志存储系统</div>
    </div>

    <script>
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                login();
            }
        }

        async function login() {
            const password = document.getElementById('password').value;
            if (!password) {
                alert('请输入密码');
                return;
            }

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Password': password
                    }
                });

                if (response.ok) {
                    // 登录成功，浏览器会自动处理 Set-Cookie
                    // 设置 sessionStorage 标记当前 Tab 已登录
                    sessionStorage.setItem('is_logged_in', 'true');
                    window.location.href = '/';
                } else {
                    alert('密码错误');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('网络错误');
            }
        }
    </script>
</body>
</html>
